<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Hub - Stable Build</title>
    <style>
        :root { --main-color: #00f2fe; --bg-color: #121212; }
        body { background: var(--bg-color); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { text-align: center; width: 90%; max-width: 400px; }
        #avatar-container { position: relative; width: 200px; height: 200px; margin: 0 auto 40px; }
        #icon {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            background-size: cover; background-position: center;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transition: transform 0.05s ease-out;
            border: 3px solid rgba(255,255,255,0.1);
        }
        .controls { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 10px; border: none; background: #2a2a2a; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        button { width: 95%; padding: 15px; border-radius: 30px; border: none; background: var(--main-color); color: #121212; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 13px; color: var(--main-color); opacity: 0.8; }
    </style>
</head>
<body>

<div id="app">
    <div id="avatar-container"><div id="icon"></div></div>
    <div class="controls">
        <input type="text" id="promptInput" placeholder="キーワードを入力">
        <button id="actionBtn">同期開始・再構成</button>
        <div id="status">システム待機中...</div>
    </div>
</div>

<script>
btn.addEventListener('click', async () => {
    // 1. 音声エンジンの起動・再開
    if (!isStarted) {
        await startAudioEngine();
    } else if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
    }

    // 2. 言葉の意味を「姿」に変換する
    const prompt = input.value.trim() || "abstract";
    status.innerText = `${prompt} を再構成中...`;
    icon.style.opacity = "0.5";
    
    // 知恵：キーワード検索に直結した画像URLを生成
    // キャッシュ回避のためにタイムスタンプを付与
    const timestamp = new Date().getTime();
    const aiSource = `https://source.unsplash.com/featured/400x400?${encodeURIComponent(prompt)}&sig=${timestamp}`;

    const newImg = new Image();
    newImg.src = aiSource;

    newImg.onload = () => {
        icon.style.backgroundImage = `url(${aiSource})`;
        icon.style.backgroundSize = "cover";
        icon.style.opacity = "1";
        status.innerText = `同期完了：${prompt} として顕現`;
    };

    newImg.onerror = () => {
        // もし検索でエラーが出た場合は、安全なランダム画像へフォールバック
        icon.style.backgroundImage = `url(https://picsum.photos/seed/${timestamp}/400/400)`;
        icon.style.opacity = "1";
        status.innerText = "汎用イメージで同期中";
    };
});
</script>
</body>
</html>
