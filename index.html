<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Hub - Synced Avatar</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { text-align: center; width: 300px; }
        #icon {
            width: 200px; height: 200px; border-radius: 50%; margin: 0 auto 30px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            background-size: cover; background-position: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            transition: transform 0.05s ease-out, background-image 0.8s ease-in-out, opacity 0.5s;
        }
        .controls { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(5px); }
        input { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; text-align: center; }
        button { width: 90%; padding: 12px; border-radius: 25px; border: none; background: #00f2fe; font-weight: bold; cursor: pointer; }
        #status { font-size: 12px; margin-top: 10px; color: #00f2fe; }
    </style>
</head>
<body>

<div id="app">
    <div id="icon"></div>
    <div class="controls">
        <input type="text" id="word" placeholder="キーワード（海底、宇宙など）">
        <button id="btn">姿を再構成する</button>
        <p id="status">システム待機中</p>
    </div>
</div>

<script>
let audioContext, analyser, dataArray, isStarted = false;
const icon = document.getElementById('icon');
const btn = document.getElementById('btn');
const status = document.getElementById('status');

btn.addEventListener('click', async () => {
    const val = document.getElementById('word').value || "abstract";
    
    if (!isStarted) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            source.connect(analyser);
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            isStarted = true;
            btn.innerText = "再構成を実行";
            render();
        } catch (e) { alert("マイクを許可してください"); return; }
    }

    // 画像切り替え（知恵：Unsplashの安定版URLを使用）
    status.innerText = "次元編集中...";
    icon.style.opacity = "0.3";
    const imgUrl = `https://source.unsplash.com/featured/?${encodeURIComponent(val)}`;
    
    const img = new Image();
    img.src = imgUrl;
    img.onload = () => {
        icon.style.backgroundImage = `url(${imgUrl})`;
        icon.style.opacity = "1";
        status.innerText = `観測完了: ${val}`;
    };
});

function render() {
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
    const avg = sum / dataArray.length;
    icon.style.transform = `scale(${1 + avg/80})`; // 少し敏感に
    icon.style.boxShadow = `0 0 ${avg}px #00f2fe`;
    requestAnimationFrame(render);
}
</script>
</body>
</html>
