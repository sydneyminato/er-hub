<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Hub - Production Build</title>
    <style>
        :root { --main-color: #00f2fe; --bg-color: #121212; }
        body { background: var(--bg-color); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { text-align: center; width: 90%; max-width: 400px; }
        #avatar-container { position: relative; width: 200px; height: 200px; margin: 0 auto 40px; }
        #icon {
            width: 100%; height: 100%; border-radius: 50%;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            background-size: cover; background-position: center;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            transition: transform 0.05s ease-out, opacity 0.5s;
            border: 3px solid rgba(255,255,255,0.1);
        }
        .controls { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); }
        input[type="text"] { width: 85%; padding: 12px; border-radius: 10px; border: none; background: #2a2a2a; color: white; margin-bottom: 15px; text-align: center; outline: none; }
        button { width: 95%; padding: 15px; border-radius: 30px; border: none; background: var(--main-color); color: #121212; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 12px; color: var(--main-color); opacity: 0.8; }
    </style>
</head>
<body>

<div id="app">
    <div id="avatar-container"><div id="icon"></div></div>
    <div class="controls">
        <input type="text" id="promptInput" placeholder="キーワードを入力（例：turtle）">
        <button id="actionBtn">同期開始・再構成</button>
        <div id="status">システム待機中...</div>
    </div>
</div>

<script>
let audioContext, analyser, dataArray, isStarted = false;
const icon = document.getElementById('icon');
const btn = document.getElementById('actionBtn');
const input = document.getElementById('promptInput');
const status = document.getElementById('status');

btn.addEventListener('click', async () => {
    // 1. iOS/Mac対策：ユーザー操作をトリガーにAudioContextを確実に起動
    if (!isStarted) {
        await startAudioEngine();
    } else if (audioContext && audioContext.state === 'suspended') {
        await audioContext.resume();
    }

    // 2. キーワード連動画像の取得（最新のUnsplash API形式）
    const keyword = input.value.trim() || "abstract";
    status.innerText = `${keyword} を再構成中...`;
    icon.style.opacity = "0.5";

    // 確実に動く最新の画像URL（Unsplashの公式リダイレクトを使用）
    const timestamp = Date.now();
    const newImg = new Image();
    // ここが最新の「知恵」：https://images.unsplash.com/ を利用
    newImg.src = `https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=400&q=80&sig=${timestamp}&utm_source=er-hub&query=${encodeURIComponent(keyword)}`;
    
    // より確実なキーワード連動：LOREM PICSUM + キーワード（擬似）
    const aiSource = `https://picsum.photos/seed/${encodeURIComponent(keyword)}/400/400`;

    newImg.src = aiSource;
    newImg.onload = () => {
        icon.style.backgroundImage = `url(${aiSource})`;
        icon.style.opacity = "1";
        status.innerText = `同期完了：${keyword} を観測`;
    };
    newImg.onerror = () => {
        status.innerText = "画像取得エラー。音声同期のみ継続。";
        icon.style.opacity = "1";
    };
});

async function startAudioEngine() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        isStarted = true;
        render();
    } catch (err) {
        status.innerText = "マイク設定を確認してください";
    }
}

function render() {
    if(!analyser) return;
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
    const avg = sum / dataArray.length;
    icon.style.transform = `scale(${1 + (avg / 100)})`;
    icon.style.boxShadow = `0 0 ${avg}px var(--main-color)`;
    requestAnimationFrame(render);
}
</script>
</body>
</html>
