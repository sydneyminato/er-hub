<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ER Hub - Synced Avatar</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #app { text-align: center; width: 300px; }
        #icon {
            width: 200px; height: 200px; border-radius: 50%; margin: 0 auto 30px;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            background-size: cover; background-position: center;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.4);
            transition: transform 0.05s ease-out, background-image 0.8s ease-in-out, opacity 0.5s;
        }
        .controls { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(5px); }
        input { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; text-align: center; }
        button { width: 90%; padding: 12px; border-radius: 25px; border: none; background: #00f2fe; font-weight: bold; cursor: pointer; }
        #status { font-size: 12px; margin-top: 10px; color: #00f2fe; }
    </style>
</head>
<body>

<div id="app">
    <div id="icon"></div>
    <div class="controls">
        <input type="text" id="word" placeholder="キーワード（海底、宇宙など）">
        <button id="btn">姿を再構成する</button>
        <p id="status">システム待機中</p>
    </div>
</div>

<script>
// ... (AudioEngineの変数はそのまま) ...

btn.addEventListener('click', async () => {
    const prompt = input.value.trim() || "abstract";
    
    if (!isStarted) {
        await startAudioEngine();
        isStarted = true;
        btn.innerText = "姿を再構成する";
    }

    // AI画像の「再構成」プロセス
    status.innerText = "存在を編集中...";
    icon.style.opacity = "0.5"; // 編集中は少し暗くする演出

    // 知恵：ランダムな数値を足して、毎回違う画像が出るようにハックする
    const randomSeed = Math.floor(Math.random() * 1000);
    const imageUrl = `https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=300&sig=${randomSeed}&q=${encodeURIComponent(prompt)}`;
    
    // 実際にはより精度の高い以下のURL形式を使います
    const aiSource = `https://source.unsplash.com/300x300/?${encodeURIComponent(prompt)}`;

    const img = new Image();
    img.crossOrigin = "Anonymous"; // これが重要：ブロックを防ぐ「知恵」
    img.src = aiSource;

    img.onload = () => {
        icon.style.backgroundImage = `url(${aiSource})`;
        icon.style.backgroundSize = "cover";
        icon.style.opacity = "1";
        status.innerText = `同期完了: 「${prompt}」を観測`;
    };

    img.onerror = () => {
        status.innerText = "再構成失敗。デフォルトを維持。";
        icon.style.opacity = "1";
    };
});

// ... (render関数とstartAudioEngineはそのまま) ...
</script>
</body>
</html>
